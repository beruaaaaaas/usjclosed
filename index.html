<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USJ 閉幕アトラクション記念碑</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #18181f;
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --gold-dim: #4a3d1c;
  --text: #e8e0d0;
  --text-dim: #7a7060;
  --pink: #e0507a;
  --green: #5bbf6a;
  --orange: #d09060;
  --red: #b05040;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 80% 50% at 50% -5%, rgba(201,168,76,0.07) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}
.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 2rem 1rem 5rem;
  position: relative;
  z-index: 1;
}

header {
  text-align: center;
  padding: 2.5rem 0 2rem;
  border-bottom: 1px solid var(--gold-dim);
  margin-bottom: 2rem;
}
.header-label {
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 0.4em;
  font-size: 0.72rem;
  color: var(--gold);
  margin-bottom: 0.7rem;
}
h1 {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(1.4rem, 4vw, 2rem);
  font-weight: 300;
  letter-spacing: 0.12em;
  line-height: 1.5;
  margin-bottom: 0.5rem;
}
h1 em { color: var(--gold-light); font-style: normal; font-weight: 700; }
.header-sub { font-size: 0.73rem; color: var(--text-dim); letter-spacing: 0.06em; }

.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border: 1px solid var(--gold-dim);
  margin-bottom: 1.8rem;
  background: var(--surface);
}
.stat {
  padding: 1rem 0.5rem;
  text-align: center;
  border-right: 1px solid var(--gold-dim);
}
.stat:last-child { border-right: none; }
.stat-n { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--gold); line-height: 1; }
.stat-l { font-size: 0.62rem; color: var(--text-dim); letter-spacing: 0.06em; margin-top: 0.2rem; }

.controls {
  display: flex;
  gap: 0.7rem;
  margin-bottom: 1rem;
  flex-wrap: wrap;
  align-items: center;
}
.search-box {
  flex: 1;
  min-width: 180px;
  background: var(--surface);
  border: 1px solid var(--gold-dim);
  color: var(--text);
  padding: 0.55rem 0.9rem;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.8rem;
  outline: none;
  letter-spacing: 0.04em;
  transition: border-color 0.2s;
}
.search-box:focus { border-color: var(--gold); }
.filter-wrap { display: flex; gap: 0.35rem; flex-wrap: wrap; }
.fbtn {
  background: var(--surface);
  border: 1px solid var(--gold-dim);
  color: var(--text-dim);
  padding: 0.45rem 0.8rem;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  letter-spacing: 0.04em;
}
.fbtn:hover, .fbtn.on { background: var(--gold-dim); border-color: var(--gold); color: var(--gold-light); }

.sort-row {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-bottom: 1.2rem;
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}
.sbtn {
  background: none; border: none;
  color: var(--text-dim);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.7rem;
  cursor: pointer;
  padding: 0.25rem 0.5rem;
  border-bottom: 1px solid transparent;
  transition: all 0.15s;
}
.sbtn.on { color: var(--gold); border-color: var(--gold); }

.count-line { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 0.8rem; letter-spacing: 0.05em; }
.count-line b { color: var(--gold); font-family: 'Bebas Neue', sans-serif; font-size: 1rem; font-weight: normal; }

.cards { display: flex; flex-direction: column; gap: 1px; }

.card {
  background: var(--surface);
  border-left: 3px solid var(--gold-dim);
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.15s;
}
.card:hover { border-left-color: var(--gold); }

.card.cl-today   { border-left-color: var(--pink); animation: todayPulse 3s ease-in-out 0.3s infinite; }
.card.cl-recent  { border-left-color: var(--green); }
.card.cl-mid     { border-left-color: var(--gold); }
.card.cl-old     { border-left-color: var(--orange); }
.card.cl-ancient { border-left-color: var(--red); }

@keyframes todayPulse {
  0%,100% { box-shadow: none; }
  50%      { box-shadow: inset 3px 0 24px rgba(224,80,122,0.22); }
}

.card-top {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 0.5rem 1rem;
  padding: 1.1rem 1.2rem;
  align-items: center;
}
.card-era {
  font-size: 0.62rem;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  margin-bottom: 0.25rem;
  display: flex;
  align-items: center;
  gap: 0.4rem;
  flex-wrap: wrap;
}
.tag {
  background: var(--surface2);
  border: 1px solid var(--gold-dim);
  color: var(--gold);
  padding: 0.08rem 0.4rem;
  font-size: 0.58rem;
  letter-spacing: 0.08em;
}

.today-badge {
  display: inline-block;
  background: var(--pink);
  color: #fff;
  font-family: 'Bebas Neue', sans-serif;
  font-size: 0.65rem;
  letter-spacing: 0.14em;
  padding: 0.1rem 0.5rem;
  animation: badgePop 0.7s cubic-bezier(0.34,1.56,0.64,1) 0.1s both;
}
@keyframes badgePop {
  from { transform: scale(0.3); opacity: 0; }
  to   { transform: scale(1);   opacity: 1; }
}

.card-name {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(0.88rem, 2.2vw, 1rem);
  font-weight: 400;
  color: var(--text);
  line-height: 1.45;
  margin-bottom: 0.25rem;
}
.card-date { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.04em; }
.close-d { color: #7a6030; }

.card-right { text-align: right; flex-shrink: 0; min-width: 80px; }
.days-n {
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1.8rem, 5vw, 2.5rem);
  line-height: 1;
  letter-spacing: 0.03em;
}
.cl-today   .days-n { color: var(--pink);       font-size: clamp(1.2rem,3.5vw,1.7rem); }
.cl-recent  .days-n { color: var(--green); }
.cl-mid     .days-n { color: var(--gold-light); }
.cl-old     .days-n { color: var(--orange); }
.cl-ancient .days-n { color: var(--red); }
.days-l { font-size: 0.6rem; color: var(--text-dim); letter-spacing: 0.1em; margin-top: 0.1rem; }
.years-l { font-size: 0.62rem; color: var(--text-dim); letter-spacing: 0.04em; }

.card-detail {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s ease;
  border-top: 0px solid rgba(201,168,76,0.12);
}
.card.open .card-detail {
  max-height: 2000px;
  border-top: 1px solid rgba(201,168,76,0.12);
}
.card.open { border-left-color: var(--gold) !important; }

.detail-inner {
  padding: 0.9rem 1.2rem 1.1rem;
  font-size: 0.76rem;
  color: var(--text-dim);
  line-height: 1.9;
  letter-spacing: 0.04em;
}

.sub-list { margin-top: 0.8rem; display: flex; flex-direction: column; gap: 0.4rem; }
.sub-item {
  background: var(--surface2);
  border-left: 2px solid var(--gold-dim);
  padding: 0.5rem 0.75rem;
  font-size: 0.72rem;
  line-height: 1.7;
}
.sub-item b { display: block; color: var(--text); font-weight: 400; margin-bottom: 0.1rem; letter-spacing: 0.03em; }
.sub-item span { color: var(--text-dim); }

.expand-hint {
  padding: 0.3rem 1.2rem 0.4rem;
  font-size: 0.6rem;
  color: var(--text-dim);
  letter-spacing: 0.1em;
  opacity: 0.5;
  transition: opacity 0.2s;
  text-align: right;
}
.card:hover .expand-hint { opacity: 1; }
.card.open .expand-hint { display: none; }

.no-res { text-align: center; padding: 3rem; color: var(--text-dim); font-size: 0.82rem; }

footer {
  margin-top: 3rem;
  padding-top: 1.2rem;
  border-top: 1px solid var(--gold-dim);
  text-align: center;
  font-size: 0.64rem;
  color: var(--text-dim);
  letter-spacing: 0.07em;
  line-height: 2.2;
}
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--gold-dim); }
</style>
</head>

<script>
// 今日の日付をブラウザから取得
const todayStr = (function() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');
  return y+'-'+m+'-'+dd;
})();

function daysSince(s) {
  const a = new Date(s + 'T00:00:00');
  const b = new Date(todayStr + 'T00:00:00');
  return Math.round((b-a)/86400000);
}
function ageCls(n) {
  if (n===0) return 'cl-today';
  if (n<365) return 'cl-recent';
  if (n<365*3) return 'cl-mid';
  if (n<365*12) return 'cl-old';
  return 'cl-ancient';
}

const AREAS = ['すべて', ...new Set(DATA.map(d=>d.area))];
let curFilter = 'すべて';
let curSort   = 'days';

function setSort(s) {
  curSort = s;
  document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('sb-'+s).classList.add('on');
  render();
}
function setFilter(a) {
  curFilter = a;
  document.querySelectorAll('.fbtn').forEach(b=>
    b.classList.toggle('on', b.dataset.area===a)
  );
  render();
}

function buildFilters() {
  document.getElementById('filters').innerHTML = AREAS.map(a =>
    `<button class="fbtn${a==='すべて'?' on':''}" data-area="${a}" onclick="setFilter(this.dataset.area)">${a}</button>`
  ).join('');
}

function buildStats() {
  const total = DATA.length;
  const days  = DATA.map(d=>daysSince(d.closeDate));
  const avg   = Math.round(days.reduce((s,d)=>s+d,0)/total);
  const mx    = Math.max(...days);
  const todayCnt = days.filter(d=>d===0).length;
  document.getElementById('stats-wrap').innerHTML = `<div class="stat"><div class="stat-n">${total}</div><div class="stat-l">閉幕数</div></div> <div class="stat"><div class="stat-n">${mx.toLocaleString()}</div><div class="stat-l">最長経過(日)</div></div> <div class="stat"><div class="stat-n">${avg.toLocaleString()}</div><div class="stat-l">平均経過(日)</div></div> <div class="stat"><div class="stat-n" style="color:var(--pink)">${todayCnt}</div><div class="stat-l">本日クローズ🎗</div></div>`;
}

function fmtD(s){ return s.replace(/-/g,'/'); }
function wday(s){ return new Date(s+'T00:00:00').toLocaleDateString('ja-JP',{weekday:'short'}); }

function render() {
  const q = document.getElementById('q').value.toLowerCase();
  let list = DATA.filter(d=>{
    const okA = curFilter==='すべて' || d.area===curFilter;
    const okQ = !q || d.name.toLowerCase().includes(q) || d.area.toLowerCase().includes(q);
    return okA && okQ;
  });
  if (curSort==='days') list.sort((a,b)=>daysSince(b.closeDate)-daysSince(a.closeDate));
  else if (curSort==='name') list.sort((a,b)=>a.name.localeCompare(b.name,'ja'));
  else list.sort((a,b)=>new Date(b.closeDate)-new Date(a.closeDate));

  document.getElementById('cnt').innerHTML = `<b>${list.length}</b> 件を表示`;

  if(!list.length){
    document.getElementById('cards').innerHTML='<div class="no-res">該当なし</div>';
    return;
  }

  document.getElementById('cards').innerHTML = list.map((d,i)=>{
    const days = daysSince(d.closeDate);
    const cls  = ageCls(days);
    const isToday = days===0;

    const oy = d.openDate ? new Date(d.openDate).getFullYear() : null;
    const cy = new Date(d.closeDate).getFullYear();
    const rt = oy ? `${oy}〜${cy}年` : `〜${cy}年`;

    const badge = isToday ? `<span class="today-badge">本日最終日</span>` : '';

    let numBlock;
    if(isToday){
      numBlock = `<div class="days-n">TODAY</div><div class="days-l">本日クローズ</div>`;
    } else {
      const yr = (days/365.25).toFixed(1);
      numBlock = `<div class="days-n">${days.toLocaleString()}</div><div class="days-l">DAYS AGO</div><div class="years-l">${yr}年前</div>`;
    }

    const subsHtml = d.subs.length ? `<div class="sub-list">${
      d.subs.map(s=>`<div class="sub-item"><b>▸ ${s.name}</b><span>${s.desc}</span></div>`).join('')
    }</div>` : '';

    return `<div class="card ${cls}" onclick="this.classList.toggle('open')">
      <div class="card-top">
        <div>
          <div class="card-era"><span>${d.area}</span><span class="tag">${rt}</span>${badge}</div>
          <div class="card-name">${d.name}</div>
          <div class="card-date">クローズ：<span class="close-d">${fmtD(d.closeDate)}（${wday(d.closeDate)}）</span></div>
        </div>
        <div class="card-right">${numBlock}</div>
      </div>
      <div class="card-detail">
        <div class="detail-inner"><p>${d.overview}</p>${subsHtml}</div>
      </div>
      <div class="expand-hint">▼ タップで詳細・アトラクション一覧</div>
    </div>`;
  }).join('');
}

buildFilters();
buildStats();
render();
</script>
