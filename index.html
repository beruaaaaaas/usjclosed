<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>USJ 閉幕アトラクション記念碑</title>
<link href="[https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400&display=swap](https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;700&family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400&display=swap)" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0f;
  --surface: #111118;
  --surface2: #18181f;
  --gold: #c9a84c;
  --gold-light: #e8c97a;
  --gold-dim: #4a3d1c;
  --text: #e8e0d0;
  --text-dim: #7a7060;
  --pink: #e0507a;
  --green: #5bbf6a;
  --orange: #d09060;
  --red: #b05040;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Noto Sans JP', sans-serif;
  min-height: 100vh;
}
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse 80% 50% at 50% -5%, rgba(201,168,76,0.07) 0%, transparent 60%);
  pointer-events: none;
  z-index: 0;
}
.container {
  max-width: 860px;
  margin: 0 auto;
  padding: 2rem 1rem 5rem;
  position: relative;
  z-index: 1;
}
header {
  text-align: center;
  padding: 2.5rem 0 2rem;
  border-bottom: 1px solid var(--gold-dim);
  margin-bottom: 2rem;
}
.header-label {
  font-family: 'Bebas Neue', sans-serif;
  letter-spacing: 0.4em;
  font-size: 0.72rem;
  color: var(--gold);
  margin-bottom: 0.7rem;
}
h1 {
  font-family: 'Noto Serif JP', serif;
  font-size: clamp(1.4rem, 4vw, 2rem);
  font-weight: 300;
  letter-spacing: 0.12em;
  line-height: 1.5;
  margin-bottom: 0.5rem;
}
h1 em { color: var(--gold-light); font-style: normal; font-weight: 700; }
.header-sub { font-size: 0.73rem; color: var(--text-dim); letter-spacing: 0.06em; }
.stats {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  border: 1px solid var(--gold-dim);
  margin-bottom: 1.8rem;
  background: var(--surface);
}
.stat {
  padding: 1rem 0.5rem;
  text-align: center;
  border-right: 1px solid var(--gold-dim);
}
.stat:last-child { border-right: none; }
.stat-n { font-family: 'Bebas Neue', sans-serif; font-size: 1.8rem; color: var(--gold); line-height: 1; }
.stat-l { font-size: 0.62rem; color: var(--text-dim); letter-spacing: 0.06em; margin-top: 0.2rem; }
.controls {
  display: flex;
  gap: 0.7rem;
  margin-bottom: 1rem;
  flex-wrap: wrap;
  align-items: center;
}
.search-box {
  flex: 1;
  min-width: 180px;
  background: var(--surface);
  border: 1px solid var(--gold-dim);
  color: var(--text);
  padding: 0.55rem 0.9rem;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.8rem;
  outline: none;
  letter-spacing: 0.04em;
  transition: border-color 0.2s;
}
.search-box:focus { border-color: var(--gold); }
.filter-wrap { display: flex; gap: 0.35rem; flex-wrap: wrap; }
.fbtn {
  background: var(--surface);
  border: 1px solid var(--gold-dim);
  color: var(--text-dim);
  padding: 0.45rem 0.8rem;
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  letter-spacing: 0.04em;
}
.fbtn:hover, .fbtn.on { background: var(--gold-dim); border-color: var(--gold); color: var(--gold-light); }
.sort-row {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  margin-bottom: 1.2rem;
  font-size: 0.7rem;
  color: var(--text-dim);
  letter-spacing: 0.05em;
}
.sbtn {
  background: none; border: none;
  color: var(--text-dim);
  font-family: 'Noto Sans JP', sans-serif;
  font-size: 0.7rem;
  cursor: pointer;
  padding: 0.25rem 0.5rem;
  border-bottom: 1px solid transparent;
  transition: all 0.15s;
}
.sbtn.on { color: var(--gold); border-color: var(--gold); }
.count-line { font-size: 0.7rem; color: var(--text-dim); margin-bottom: 0.8rem; letter-spacing: 0.05em; }
.count-line b { color: var(--gold); font-family: 'Bebas Neue', sans-serif; font-size: 1rem; font-weight: normal; }
.cards { display: flex; flex-direction: column; gap: 1px; }
.card {
  background: var(--surface);
  border-left: 3px solid var(--gold-dim);
  overflow: hidden;
  cursor: pointer;
  transition: border-color 0.15s;
}
.card:hover { border-left-color: var(--gold); }
.card.cl-today { border-left-color: var(--pink); animation: todayPulse 3s ease-in-out infinite; }
.card.cl-recent { border-left-color: var(--green); }
.card.cl-mid { border-left-color: var(--gold); }
.card.cl-old { border-left-color: var(--orange); }
.card.cl-ancient { border-left-color: var(--red); }
@keyframes todayPulse {
  0%,100% { box-shadow: none; }
  50% { box-shadow: inset 3px 0 24px rgba(224,80,122,0.22); }
}
.card-top { display: grid; grid-template-columns: 1fr auto; gap: 0.5rem 1rem; padding: 1.1rem 1.2rem; align-items: center; }
.card-era { font-size: 0.62rem; color: var(--text-dim); letter-spacing: 0.1em; margin-bottom: 0.25rem; display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
.tag { background: var(--surface2); border: 1px solid var(--gold-dim); color: var(--gold); padding: 0.08rem 0.4rem; font-size: 0.58rem; letter-spacing: 0.08em; }
.today-badge { background: var(--pink); color: #fff; font-family: 'Bebas Neue', sans-serif; font-size: 0.65rem; padding: 0.1rem 0.5rem; animation: badgePop 0.7s cubic-bezier(0.34,1.56,0.64,1) both; }
@keyframes badgePop { from { transform: scale(0.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.card-name { font-family: 'Noto Serif JP', serif; font-size: clamp(0.88rem, 2.2vw, 1rem); color: var(--text); line-height: 1.45; }
.card-date { font-size: 0.7rem; color: var(--text-dim); }
.card-right { text-align: right; min-width: 80px; }
.days-n { font-family: 'Bebas Neue', sans-serif; font-size: clamp(1.8rem, 5vw, 2.5rem); line-height: 1; color: var(--gold); }
.cl-today .days-n { color: var(--pink); font-size: clamp(1.2rem,3.5vw,1.7rem); }
.card-detail { max-height: 0; overflow: hidden; transition: max-height 0.4s ease; border-top: 0px solid rgba(201,168,76,0.12); }
.card.open .card-detail { max-height: 2000px; border-top: 1px solid rgba(201,168,76,0.12); }
.detail-inner { padding: 0.9rem 1.2rem 1.1rem; font-size: 0.76rem; color: var(--text-dim); line-height: 1.9; }
.sub-list { margin-top: 0.8rem; display: flex; flex-direction: column; gap: 0.4rem; }
.sub-item { background: var(--surface2); border-left: 2px solid var(--gold-dim); padding: 0.5rem 0.75rem; font-size: 0.72rem; }
.sub-item b { display: block; color: var(--text); }
footer { margin-top: 3rem; padding: 1.2rem; border-top: 1px solid var(--gold-dim); text-align: center; font-size: 0.64rem; color: var(--text-dim); line-height: 2.2; }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-label">USJ · Closed Attractions Archive</div>
    <h1>USJ <em>閉幕</em>アトラクション記念碑</h1>
    <p class="header-sub">クローズした日から今日まで、何日経ったのか</p>
  </header>
  <div class="stats" id="stats-wrap"></div>
  <div class="controls">
    <input class="search-box" id="q" type="text" placeholder="🔍 アトラクション名で検索…" oninput="render()">
    <div class="filter-wrap" id="filters"></div>
  </div>
  <div class="sort-row">
    並び替え：
    <button class="sbtn on" id="sb-days" onclick="setSort('days')">経過日数↓</button>
    <button class="sbtn" id="sb-name" onclick="setSort('name')">五十音順</button>
    <button class="sbtn" id="sb-date" onclick="setSort('date')">クローズ日</button>
  </div>
  <div class="count-line" id="cnt"></div>
  <div class="cards" id="cards"></div>
  <footer>
    データは公式発表・各種報道をもとに作成。経過日数はページ表示時の日付を基準とします。<br>
    ※ リニューアルにより別名で継続運営中のものを含む。
  </footer>
</div>

<script>
const todayStr = new Date().toISOString().split('T')[0];

function daysSince(s) {
  const a = new Date(s + 'T00:00:00');
  const b = new Date(todayStr + 'T00:00:00');
  return Math.round((b - a) / 86400000);
}

function ageCls(n) {
  if (n === 0) return 'cl-today';
  if (n < 365) return 'cl-recent';
  if (n < 365 * 3) return 'cl-mid';
  if (n < 365 * 12) return 'cl-old';
  return 'cl-ancient';
}

const DATA = [
  { name: 'セサミストリート・ファン・ワールド', area: 'ユニバーサル・ワンダーランド', closeDate: '2026-05-10', openDate: '2012-03-16', overview: '14年間、子どもたちの笑顔と家族の思い出を作り続けた。特別イベントを経て本日最終日を迎えた。', subs: [{name:'エルモのゴーゴー・スケートボード', desc:'2015年新設。'}] },
  { name: 'スヌーピー・サウンド・ステージ・アドベンチャー', area: 'ユニバーサル・ワンダーランド', closeDate: '2023-11-13', openDate: '2001-03-31', overview: '22年以上運営し続けた屋内型プレイランド。', subs: [] },
  { name: 'アメージング・アドベンチャー・オブ・スパイダーマン', area: 'ニューヨーク・エリア', closeDate: '2024-01-22', openDate: '2004-01-23', overview: '20年間で延べ1億人以上が体験した伝説的ライド。', subs: [] },
  { name: 'ターミネーター 2:3-D', area: 'ハリウッド・エリア', closeDate: '2024-01-22', openDate: '2001-03-31', overview: 'USJ初期の人気作。2024年に閉幕。', subs: [] },
  { name: 'バックドラフト', area: 'サンフランシスコ・エリア', closeDate: '2024-01-22', openDate: '2001-03-31', overview: '炎の恐怖を体感するツアー型アトラクション。', subs: [] },
  { name: 'バック・トゥ・ザ・フューチャー・ザ・ライド', area: 'サンフランシスコ・エリア', closeDate: '2016-05-31', openDate: '2001-03-31', overview: '8人乗りデロリアンでのタイムトラベル。', subs: [] },
  { name: 'E.T. アドベンチャー', area: 'ハリウッド・エリア', closeDate: '2009-04-19', openDate: '2001-03-31', overview: '森の中を自転車で駆け抜ける感動のフライト。', subs: [] }
];

let curFilter = 'すべて';
let curSort = 'days';

function setSort(s) {
  curSort = s;
  document.querySelectorAll('.sbtn').forEach(b => b.classList.toggle('on', b.id === 'sb-' + s));
  render();
}

function setFilter(a) {
  curFilter = a;
  document.querySelectorAll('.fbtn').forEach(b => b.classList.toggle('on', b.dataset.area === a));
  render();
}

function buildFilters() {
  const areas = ['すべて', ...new Set(DATA.map(d => d.area))];
  document.getElementById('filters').innerHTML = areas.map(a => 
    `<button class="fbtn ${a === curFilter ? 'on' : ''}" data-area="${a}" onclick="setFilter('${a}')">${a}</button>`
  ).join('');
}

function render() {
  const q = document.getElementById('q').value.toLowerCase();
  let list = DATA.filter(d => (curFilter === 'すべて' || d.area === curFilter) && d.name.toLowerCase().includes(q));
  
  if (curSort === 'days') list.sort((a, b) => daysSince(b.closeDate) - daysSince(a.closeDate));
  else if (curSort === 'name') list.sort((a, b) => a.name.localeCompare(b.name, 'ja'));
  else list.sort((a, b) => new Date(b.closeDate) - new Date(a.closeDate));

  document.getElementById('cards').innerHTML = list.map(d => {
    const days = daysSince(d.closeDate);
    const oy = d.openDate ? new Date(d.openDate).getFullYear() : '???';
    const cy = new Date(d.closeDate).getFullYear();
    const isToday = days === 0;
    
    return `
      <div class="card ${ageCls(days)}" onclick="this.classList.toggle(&apos;open&apos;)">
        <div class="card-top">
          <div>
            <div class="card-era"><span>${d.area}</span><span class="tag">${oy}〜${cy}年</span>${isToday ? '<span class="today-badge">本日最終日</span>' : ''}</div>
            <div class="card-name">${d.name}</div>
          </div>
          <div class="card-right">
            <div class="days-n">${isToday ? 'TODAY' : days.toLocaleString()}</div>
            <div class="days-l">${isToday ? 'CLOSED' : 'DAYS AGO'}</div>
          </div>
        </div>
        <div class="card-detail">
          <div class="detail-inner">${d.overview}</div>
        </div>
      </div>`;
  }).join('');
}

function buildStats() {
  const days = DATA.map(d => daysSince(d.closeDate));
  document.getElementById('stats-wrap').innerHTML = `
    <div class="stat"><div class="stat-n">${DATA.length}</div><div class="stat-l">閉幕数</div></div>
    <div class="stat"><div class="stat-n">${Math.max(...days).toLocaleString()}</div><div class="stat-l">最長経過</div></div>
  `;
}

buildFilters();
buildStats();
render();
</script>
</body>
</html>
